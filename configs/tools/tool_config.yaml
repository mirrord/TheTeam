  python3: "Python 3 interpreter"
  pip: "Python package installer"
  pip3: "Python 3 package installer"
  powershell: "Windows PowerShell — run scripts or commands via powershell -Command \"...\""
  pwsh: "PowerShell Core (cross-platform) — run scripts or commands via pwsh -Command \"...\""
  cmd: "Windows Command Prompt — run commands via cmd /c \"...\""
  bash: "Bash shell — run scripts or commands via bash -c \"...\""
  sh: "POSIX shell — run scripts or commands via sh -c \"...\""
  wsl: "Windows Subsystem for Linux — run Linux commands via wsl <command>"
  git: "Distributed version control system"
