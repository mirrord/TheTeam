# Tool Configuration for pithos Agent Tool Calling

# Enable or disable tool calling system
enabled: true

# Maximum execution time for any tool (seconds)
timeout: 30

# Maximum size of captured output (bytes)
max_output_size: 10000

# Filtering mode: 'include', 'exclude', or 'all'
# - 'include': Only tools in the include list are allowed
# - 'exclude': All tools except those in exclude list are allowed
# - 'all': All discovered tools are allowed (apply exclude list only)
mode: include

# List of tools to include (used when mode is 'include')
include:
  # --- Python ---
  - python
  - python3
  - pip
  - pip3
  # --- Shell interpreters ---
  - powershell
  - pwsh
  - cmd
  - bash
  - sh
  - wsl
  # --- Version control ---
  - git
  # --- Network ---
  - curl
  - wget
  - ssh
  - scp
  - ping
  - nslookup
  - tracert
  - traceroute
  - netstat
  - ipconfig
  - ifconfig
  # --- Node.js ---
  - node
  - npm
  - npx
  # --- File & text utilities ---
  - echo
  - cat
  - type
  - more
  - less
  - head
  - tail
  - ls
  - dir
  - pwd
  - cd
  - grep
  - find
  - which
  - where
  - sort
  - wc
  - awk
  - sed
  - tr
  - diff
  - tree
  - touch
  - cp
  - copy
  - mv
  - move
  - mkdir
  # --- Archive ---
  - tar
  - zip
  - unzip
  # --- System info ---
  - env
  - set
  - whoami
  - hostname
  - date
  - uname
  # --- Flowcharts (virtual tool) ---
  - flowchart

# List of tools to exclude (used when mode is 'exclude' or 'all')
# These are dangerous commands that should never be allowed
exclude:
  - rm
  - rmdir
  - del
  - erase
  - format
  - shutdown
  - reboot
  - poweroff
  - init
  - kill
  - killall
  - pkill
  - dd
  - mkfs
  - fdisk

# Flowchart tool configuration
# Allows agents to run registered flowcharts as tools
flowcharts:
  enabled: true
  # Maximum execution time for flowchart tools (seconds)
  timeout: 120
  # Maximum steps per flowchart execution
  max_steps: 100

# Manual tool descriptions (override auto-discovered descriptions)
